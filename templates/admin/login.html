<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Celestial Readings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="login-page">
        <div class="glass-card login-card">
            <div style="margin-bottom:var(--space-lg);">
                <i data-lucide="sparkles" style="width:32px;height:32px;color:var(--gold);"></i>
            </div>
            <h2 style="margin-bottom:var(--space-xs);">Celestial Readings</h2>
            <p class="login-subtitle">Admin Portal</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div style="padding:var(--space-md);margin-bottom:var(--space-lg);border-radius:var(--radius-md);background:rgba(220,53,69,0.15);color:#ff6b7a;border:1px solid rgba(220,53,69,0.3);font-size:0.85rem;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:var(--space-md);">
                    <i data-lucide="log-in" style="width:16px;height:16px;"></i>
                    Sign In
                </button>
            </form>

            <a href="{{ url_for('home') }}" style="display:inline-block;margin-top:var(--space-xl);font-size:0.8rem;color:var(--text-muted);">
                ← Back to website
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
